<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="signup.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
</head>

<body>
  <div class="main_container">
    <div class="left_container">
      
        <header>
      <div class="website_logo_container">
        <div class="website_logo"><img src="images/homepageimages/star.png" height="80%" alt=""></div>
        <div class="website_name">LUMORA</div>
      </div>
      <div class="menu_container">
        <a class="menu_ancher" href="#">About</a>
        <a class="menu_ancher" href="contackus.html">Contact Us</a>
        <a class="menu_ancher" href="#">Smart Home</a>
        <a class="menu_ancher" href="#">Services</a>
      </div>
    
      
    </header>
        <div class="create">
          <div class="account_container">Get Started Now</div> 
        </div>
        <div class="form_container">

          <form class="form_content" action="#">


            <label for="Username">Name</label> <br>
            <input class="name_enter_box" id="Username" type="text" name="Username" required
              placeholder="Enter your name">
            <br><br>
            <label for="e-mail_address">E-mail address</label>
            <br>
            <input class="e-mail_enter_box" id="e-mail_address" type="email" name="e-mail" required
              placeholder="Enter your e-mail">
            <br><br>

            <label for="Password">Password</label>
            <br>
            <input class="password_enter_box" id="Password" type="password" name="password" required="password"
              placeholder="Password">
            <br><br>
            <input class="checkbox1" id="checkbox" type="checkbox" required>
            <label id="terms_condition" for="checkbox"> I agree to the terms & policy.</label>
            <br><br>
            <div class="submit_button">

              <button type="submit">Sign up</button>
            </div>
            <div class="other_login_optons">
              <a
                href="https://accounts.google.com/v3/signin/identifier?dsh=S1812573153%3A1655944654029516&flowEntry=ServiceLogin&flowName=WebLiteSignIn&ifkv=AX3vH39E0iYVTmn-NoMNM_C35EPrno8LWsRx2Qhr0HApkVLZ-Zc_Vql8ouaSQOiXzEmthrpOPAV5"><img
                  src="icons/google-square.png" width="28px" alt=""></a>
              <a href=""><img src="icons/facebook-square.png" width="28px" alt=""></a>
            </div>


          </form>
        </div>

      </div>
    
    <div class="background_img_container">
    </div>
  </div>
</body>

</html>
